<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stats Graph Engine · verification</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* Dev tool: renders every graph type and confirms each drawn feature
   reads back to its declared value. The stats analog of Circle Quest's
   verify.html ("ALL TO SCALE"). */
:root{
  --bg:#04101a; --panel:rgba(10,30,42,.55); --brd:rgba(56,224,210,.16);
  --ink:#eafcff; --muted:#7fb6c4; --faint:#4d8493;
  --g-ink:#cfeef4; --g-muted:#7fb6c4; --g-axis:rgba(180,230,240,.45);
  --g-grid:rgba(127,182,196,.16); --g-read:#fcd34d; --g-out:#fb7185;
  --ok:#34d399; --bad:#fb7185;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"JetBrains Mono",monospace;background:linear-gradient(180deg,var(--bg),#06182a);color:var(--ink);min-height:100vh;padding:28px 18px 80px}
.wrap{max-width:980px;margin:0 auto}
h1{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:22px;letter-spacing:.5px}
.lead{color:var(--muted);font-size:13px;margin:4px 0 22px}
#banner{font-family:"Space Grotesk",sans-serif;font-weight:700;font-size:18px;padding:16px 20px;border-radius:14px;margin-bottom:24px;border:1px solid var(--brd)}
#banner.pass{background:rgba(52,211,153,.12);color:var(--ok);border-color:rgba(52,211,153,.4)}
#banner.fail{background:rgba(251,113,133,.12);color:var(--bad);border-color:rgba(251,113,133,.4)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(440px,1fr));gap:18px}
.card{background:var(--panel);border:1px solid var(--brd);border-radius:16px;padding:16px;backdrop-filter:blur(8px)}
.card h3{font-family:"Space Grotesk",sans-serif;font-weight:600;font-size:14px;margin-bottom:4px}
.card .meta{color:var(--faint);font-size:11px;margin-bottom:10px}
.gbox{background:rgba(255,255,255,.02);border:1px solid var(--brd);border-radius:12px;padding:8px;margin-bottom:12px}
.checks{list-style:none;font-size:11.5px;line-height:1.55}
.checks li{display:flex;gap:8px;padding:2px 0;color:var(--muted)}
.checks li .i{flex:0 0 auto;font-weight:700}
.checks li.ok .i{color:var(--ok)} .checks li.bad .i{color:var(--bad);}
.checks li.bad{color:var(--bad)}
.sg{width:100%;height:auto;display:block;font-family:"JetBrains Mono",monospace}
.sg text{fill:var(--g-muted)}
.sg-axis{stroke:var(--g-axis);stroke-width:1}
.sg-grid{stroke:var(--g-grid);stroke-width:.5}
.sg-lab{font-size:9px}
.sg-title{font-size:10px;fill:var(--g-ink)}
.sg-val{font-size:9px;fill:var(--g-ink)}
.sg-box{stroke:var(--accent);stroke-width:2;fill:color-mix(in srgb,var(--accent) 16%,transparent)}
.sg-med{stroke:var(--accent);stroke-width:2.6}
.sg-whisk{stroke:var(--accent);stroke-width:1.6}
.sg-outlier{fill:var(--g-out)}
.sg-line{stroke:var(--accent);stroke-width:2.4;stroke-linejoin:round;stroke-linecap:round;fill:none}
.sg-pt{fill:var(--accent)}
.sg-read{stroke:var(--g-read);stroke-width:1.2;stroke-dasharray:3 3}
.sg-read-dot{fill:var(--g-read)}
.sg-read-lab{fill:var(--g-read);font-size:9px;font-weight:700}
.sg-bar{fill:color-mix(in srgb,var(--accent) 28%,transparent);stroke:var(--accent);stroke-width:1.2}
</style>
</head>
<body>
<div class="wrap">
  <h1>Stats graph engine · verification</h1>
  <p class="lead">Every graph is drawn from real data; each check re-derives a declared value back out of the geometry. If everything matches, no graph can mislead a learner.</p>
  <div id="banner">running…</div>
  <div class="grid" id="grid"></div>
</div>

<script type="module">
import { renderGraph, verifyGraph } from "./js/engine/stats-graph.js";

/* Test specs — a few of every type, including edge cases (outliers,
   skewed shapes, read-offs). These are ENGINE tests, not game content. */
const SPECS = [
  { title: "Box plot · symmetric", accent: "#a855f7", spec: {
    type: "box", five: { min: 12, q1: 34, med: 48, q3: 67, max: 89 }, title: "marks" } },

  { title: "Box plot · with outliers", accent: "#a855f7", spec: {
    type: "box", five: { min: 5, q1: 7, med: 8.5, q3: 9, max: 12 },
    outliers: [1, 15], axis: { min: 0, max: 16, step: 2 }, dp: 1 } },

  { title: "Box plot · skewed right", accent: "#c084fc", spec: {
    type: "box", five: { min: 20, q1: 30, med: 34, q3: 48, max: 80 },
    axis: { min: 0, max: 80, step: 10 } } },

  { title: "Ogive · read median, Q1, Q3", accent: "#38e0d2", spec: {
    type: "ogive", title: "marks",
    classes: [
      { lower: 20, upper: 30, freq: 80 }, { lower: 30, upper: 40, freq: 140 },
      { lower: 40, upper: 50, freq: 20 }, { lower: 50, upper: 60, freq: 10 },
      { lower: 60, upper: 70, freq: 5 }, { lower: 70, upper: 80, freq: 0 },
      { lower: 80, upper: 90, freq: 45 },
    ],
    readCum: [75, 150, 225] } },

  { title: "Ogive · read a percentile", accent: "#38e0d2", spec: {
    type: "ogive", title: "time (min)",
    classes: [
      { lower: 0, upper: 10, freq: 4 }, { lower: 10, upper: 20, freq: 11 },
      { lower: 20, upper: 30, freq: 20 }, { lower: 30, upper: 40, freq: 9 },
      { lower: 40, upper: 50, freq: 6 },
    ],
    readVal: [25] } },

  { title: "Histogram · class frequencies", accent: "#7dd3fc", spec: {
    type: "hist", title: "marks",
    classes: [
      { lower: 0, upper: 20, freq: 3 }, { lower: 20, upper: 40, freq: 8 },
      { lower: 40, upper: 60, freq: 14 }, { lower: 60, upper: 80, freq: 9 },
      { lower: 80, upper: 100, freq: 4 },
    ] } },

  { title: "Number line · tap to read", accent: "#fcd34d", spec: {
    type: "numline", min: 0, max: 50, step: 5,
    marks: [{ value: 18, label: "18" }, { value: 37, label: "37" }] } },
];

const grid = document.getElementById("grid");
let total = 0, passed = 0;

SPECS.forEach(t => {
  const checks = verifyGraph(t.spec);
  const svg = renderGraph(t.spec);
  const allOk = checks.every(c => c.ok);
  total += checks.length;
  passed += checks.filter(c => c.ok).length;

  const card = document.createElement("div");
  card.className = "card";
  card.innerHTML = `
    <h3>${t.title}</h3>
    <div class="meta">${t.spec.type} · ${checks.length} checks · ${allOk ? "✓ to scale" : "✗ FAIL"}</div>
    <div class="gbox">${svg}</div>
    <ul class="checks">${checks.map(c => `<li class="${c.ok ? "ok" : "bad"}"><span class="i">${c.ok ? "✓" : "✗"}</span><span>${c.label}</span></li>`).join("")}</ul>`;
  grid.appendChild(card);
});

const banner = document.getElementById("banner");
if (passed === total) { banner.className = "pass"; banner.textContent = `✓ ALL TO SCALE — ${passed}/${total} checks passed across ${SPECS.length} graphs`; }
else { banner.className = "fail"; banner.textContent = `✗ ${total - passed} of ${total} checks FAILED — fix before shipping`; }

// surface the result for headless checks too
window.__VERIFY__ = { total, passed, ok: passed === total };
console.log(`[verify] ${passed}/${total} checks passed — ${passed === total ? "ALL TO SCALE" : "FAILURES"}`);
</script>
</body>
</html>
